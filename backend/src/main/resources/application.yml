# 攒钱记账应用 - Spring Boot配置文件

# 服务器配置
server:
  port: 8080  # 服务器端口号
  servlet:
    context-path: /v1  # API前缀路径

# Spring框架配置
spring:
  # 数据源配置（MySQL数据库）
  datasource:
    url: jdbc:mysql://47.108.67.45:3306/saveapp?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: saveManager      # ← 改成你的MySQL用户名
    password: secAdmin#1234      # ← 改成你的MySQL密码

  # JPA 持久化配置
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect  # MySQL 方言
    hibernate:
      ddl-auto: update  # 自动更新表结构（补齐缺失的列）
    show-sql: true  # 是否打印 SQL 语句
    properties:
      hibernate:
        format_sql: true

  # 开启 SQL 和 JDBC 日志
logging:
  level:
    root: INFO
    com.zanqian.savemoney: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

  # Servlet配置
  servlet:
    multipart:
      max-file-size: 10MB  # 单个文件最大大小
      max-request-size: 10MB  # 请求最大大小

  # Jackson JSON配置
  jackson:
    default-property-inclusion: always  # 总是包含属性

# 应用自定义配置
app:
  # JWT令牌配置
  jwt:
    secret: zanqian-app-secret-key-for-jwt-token-signing-must-be-at-least-256-bits  # JWT签名密钥
    expiration: 7200  # Access Token过期时间（秒），2小时
    refresh-expiration: 604800  # Refresh Token过期时间（秒），7天

  # 文件上传配置
  upload:
    path: ./uploads  # 文件上传存储路径
    url-prefix: https://cdn.zanqian.app  # 文件访问URL前缀

  # 短信配置
  sms:
    expire-seconds: 300  # 短信验证码有效期（秒），5分钟

# SpringDoc OpenAPI 配置（Swagger UI）
springdoc:
  swagger-ui:
    path: /swagger-ui.html  # Swagger UI 访问路径
    tags-sorter: alpha       # 标签按字母排序
    operations-sorter: alpha # 接口按字母排序
  api-docs:
    path: /v3/api-docs      # OpenAPI JSON 文档路径

