# 攒钱记账应用 - Spring Boot配置文件

# 服务器配置
server:
  port: 8080  # 服务器端口号
  servlet:
    context-path: /v1  # API前缀路径

# Spring框架配置
spring:
  # 数据源配置（MySQL数据库）
  datasource:
    url: jdbc:mysql://47.108.67.45:3306/savemoney?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: saveManager      # ← 改成你的MySQL用户名
    password: secAdmin#1234      # ← 改成你的MySQL密码

  # JPA持久化配置
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect  # MySQL方言
    hibernate:
      ddl-auto: update  # 自动更新表结构（首次启动会自动建表，也可先用init.sql手动建表）
    show-sql: false  # 是否打印SQL语句
    properties:
      hibernate:
        format_sql: true

  # Servlet配置
  servlet:
    multipart:
      max-file-size: 10MB  # 单个文件最大大小
      max-request-size: 10MB  # 请求最大大小

  # Jackson JSON配置
  jackson:
    default-property-inclusion: always  # 总是包含属性

# 应用自定义配置
app:
  # JWT令牌配置
  jwt:
    secret: zanqian-app-secret-key-for-jwt-token-signing-must-be-at-least-256-bits  # JWT签名密钥
    expiration: 7200  # Access Token过期时间（秒），2小时
    refresh-expiration: 604800  # Refresh Token过期时间（秒），7天

  # 文件上传配置
  upload:
    path: ./uploads  # 文件上传存储路径
    url-prefix: https://cdn.zanqian.app  # 文件访问URL前缀

  # 短信配置
  sms:
    expire-seconds: 300  # 短信验证码有效期（秒），5分钟
