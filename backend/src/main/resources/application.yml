server:
  port: 8080
  servlet:
    context-path: /v1

spring:
  datasource:
    url: jdbc:h2:mem:savemoney
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    default-property-inclusion: non_null

app:
  jwt:
    secret: zanqian-app-secret-key-for-jwt-token-signing-must-be-at-least-256-bits
    expiration: 7200
    refresh-expiration: 604800
  upload:
    path: ./uploads
    url-prefix: https://cdn.zanqian.app
  sms:
    expire-seconds: 300
